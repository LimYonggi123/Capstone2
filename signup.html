<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 - 건설 하자 민원 관리 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', '맑은 고딕', 'Malgun Gothic', sans-serif;
    background-color: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .signup-box {
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    padding: 40px 36px;
    width: 400px;
  }
  .signup-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 28px;
    color: #222;
  }
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    color: #444;
    margin-bottom: 6px;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  .input-row input {
    flex: 1;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #4a90d9;
  }
  .check-btn {
    height: 40px;
    padding: 0 14px;
    background-color: #e0e0e0;
    color: #333;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s;
  }
  .check-btn:hover {
    background-color: #d0d0d0;
  }
  .message {
    font-size: 12px;
    height: 18px;
    line-height: 18px;
    margin-top: 4px;
  }
  .message.success { color: #2e7d32; }
  .message.error { color: #d32f2f; }
  .btn {
    width: 100%;
    height: 44px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .btn-primary {
    background-color: #4a90d9;
    color: #fff;
    border: none;
    margin-top: 10px;
  }
  .btn-primary:hover:not(:disabled) {
    background-color: #357ab8;
  }
  .btn-secondary {
    background-color: #fff;
    color: #4a90d9;
    border: 1px solid #4a90d9;
    margin-top: 8px;
  }
  .btn-secondary:hover {
    background-color: #f5faff;
  }
</style>
</head>
<body>
  <div class="signup-box">
    <h1 class="signup-title">회원가입</h1>

    <div class="form-group">
      <label for="username">아이디</label>
      <div class="input-row">
        <input type="text" id="username" autocomplete="username">
        <button type="button" class="check-btn" id="checkBtn">중복확인</button>
      </div>
      <div class="message" id="usernameMsg"></div>
    </div>

    <div class="form-group">
      <label for="password">비밀번호</label>
      <input type="password" id="password" autocomplete="new-password">
    </div>

    <div class="form-group">
      <label for="passwordConfirm">비밀번호 확인</label>
      <input type="password" id="passwordConfirm" autocomplete="new-password">
      <div class="message" id="passwordMsg"></div>
    </div>

    <button type="button" class="btn btn-primary" id="submitBtn">확인</button>
    <button type="button" class="btn btn-secondary" id="backBtn">돌아가기</button>
  </div>

<script>
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const passwordConfirmInput = document.getElementById('passwordConfirm');
  const checkBtn = document.getElementById('checkBtn');
  const submitBtn = document.getElementById('submitBtn');
  const backBtn = document.getElementById('backBtn');
  const usernameMsg = document.getElementById('usernameMsg');
  const passwordMsg = document.getElementById('passwordMsg');

  let isUsernameChecked = false;

  function setMsg(el, text, type) {
    el.textContent = text;
    el.classList.remove('success', 'error');
    if (type) el.classList.add(type);
  }

  // 1. 중복확인
  checkBtn.addEventListener('click', async () => {
    const username = usernameInput.value.trim();
    if (!username) {
      setMsg(usernameMsg, '아이디를 입력해주세요.', 'error');
      isUsernameChecked = false;
      return;
    }
    try {
      const res = await fetch('/api/auth/check-username?username=' + encodeURIComponent(username));
      const data = await res.json();
      if (data.available) {
        setMsg(usernameMsg, '사용 가능한 아이디입니다.', 'success');
        isUsernameChecked = true;
      } else {
        setMsg(usernameMsg, '중복된 아이디입니다.', 'error');
        isUsernameChecked = false;
      }
    } catch (err) {
      setMsg(usernameMsg, '서버와 통신할 수 없습니다.', 'error');
      isUsernameChecked = false;
    }
  });

  // 아이디 입력값 수정 시 중복확인 상태 리셋
  usernameInput.addEventListener('input', () => {
    isUsernameChecked = false;
    setMsg(usernameMsg, '', null);
  });

  // 2. 비밀번호 확인 실시간 검증
  function validatePasswordConfirm() {
    const pw = passwordInput.value;
    const pwc = passwordConfirmInput.value;
    if (pwc.length === 0 || pw === pwc) {
      setMsg(passwordMsg, '', null);
    } else {
      setMsg(passwordMsg, '비밀번호가 일치하지 않습니다.', 'error');
    }
  }
  passwordConfirmInput.addEventListener('input', validatePasswordConfirm);
  passwordInput.addEventListener('input', validatePasswordConfirm);

  // 3. 확인 버튼
  submitBtn.addEventListener('click', async () => {
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    const passwordConfirm = passwordConfirmInput.value;

    if (!username) {
      setMsg(usernameMsg, '아이디를 입력해주세요.', 'error');
      return;
    }
    if (!isUsernameChecked) {
      setMsg(usernameMsg, '아이디 중복확인을 해주세요.', 'error');
      return;
    }
    if (!password) {
      alert('비밀번호를 입력해주세요.');
      return;
    }
    if (password !== passwordConfirm) {
      // 비밀번호 확인 메시지는 이미 input 이벤트에서 표시됨
      return;
    }

    submitBtn.disabled = true;
    try {
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        alert('회원가입이 완료되었습니다.');
        location.href = '/login.html';
      } else {
        alert(data.error || '회원가입에 실패했습니다.');
      }
    } catch (err) {
      alert('서버와 통신할 수 없습니다.');
    } finally {
      submitBtn.disabled = false;
    }
  });

  // 4. 돌아가기
  backBtn.addEventListener('click', () => {
    location.href = '/login.html';
  });
</script>
</body>
</html>
